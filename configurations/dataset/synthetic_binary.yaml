# Synthetic binary conditioning dataset for cross-attention smoke test.
# No real data needed — generates black/white frames on the fly.
#
# external_cond layout: [0, 0, 0, label]  (3 action zeros + 1 binary)
# The label (0.0 or 1.0) is the sole cross-attention context token.

defaults:
  - base_video

name: synthetic_binary

# Unused by SyntheticBinaryDataset but required by base_video schema.
save_dir: /tmp/synthetic_binary_unused

resolution: 16
observation_shape: [3, 16, 16]
max_frames: 4
n_frames: 4
context_length: 1
frame_skip: 1

# 3 action zeros + 1 binary label = 4
external_cond_dim: 4
node_emb_dim: 1
external_cond_stack: false
# "none" = pass conditions through unchanged (no first-frame masking).
external_cond_processing: none

n_samples: 2000

data_mean: 0.5
data_std: 0.5

latent:
  enable: false
