# Dataset configuration for the file-explorer (ui_sim) trajectories.
# Data must be built first:  python scripts/build_dfot_dataset.py

defaults:
  - base_video

# Directory where .npz files are stored (built by scripts/build_dfot_dataset.py).
save_dir: data/file_explorer

# Target resolution (longer side). Frames are resized aspect-ratio-preserving.
# At resolution=256: resize 1024×768 → 256×192 (no crop, no pad).
# UVit3D supports non-square inputs after the _unrearrange_if_transformer fix.
resolution: 256

# Actual frame shape after resize: 192×256 (H×W).
observation_shape: [3, 192, 256]

# Maximum number of frames to load per clip during training.
max_frames: 32

# Number of context frames provided to the model.
context_length: 8

# Dimension of the external conditioning vector.
# New 3-dim format: [action_type_idx, x/1024, y/768]
external_cond_dim: 3

# Mask the conditioning on the first (context) frames so the model learns
# to generate future frames given only the visual context.
external_cond_processing: mask_first

# Normalisation: frames are loaded as float32 in [0, 1] by /255, then
# mean=0.5 / std=0.5 maps them to [-1, 1] for the diffusion model.
data_mean: 0.5
data_std: 0.5

# Pixel-space training — no VAE latents.
latent:
  enable: false
