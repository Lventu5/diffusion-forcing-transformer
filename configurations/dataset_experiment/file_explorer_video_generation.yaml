# @package _global_

experiment:
  reload_dataloaders_every_n_epochs: 1
  training:
    lr: 1e-4
    batch_size: 8
    max_epochs: 200
    checkpointing:
      every_n_train_steps: 1000
      every_n_epochs: null
    optim:
      accumulate_grad_batches: 1
      gradient_clip_val: 1.0
    data:
      num_workers: 11
  validation:
    batch_size: 16
    val_every_n_epoch: 1
    limit_batch: 1.0
    precision: bf16-mixed   # fp16 overflows at high noise levels during denoising
    data:
      num_workers: 1

algorithm:
  diffusion:
    loss_weighting:
      strategy: sigmoid
      sigmoid_bias: -1.0
    training_schedule:
      name: cosine
      shift: 0.125
  backbone:
    name: uvit3d_action
    external_cond_dropout: 0.1
    # UVit3D checkpointing is controlled per-level via use_checkpointing list in
    # configurations/algorithm/backbone/uvit3d_action.yaml
