# Important: Be careful when modifying this file! The fields in file will be overridden by the dataset dependent config file in the `configurations/dataset_experiment` folder so consider making changes there instead! 


defaults:
  - base_pytorch_algo
  - backbone: dit3d

# dataset-dependent configurations
x_shape: ${dataset.observation_shape}
max_frames: ${dataset.max_frames}
n_frames: ${dataset.n_frames}
frame_skip: ${dataset.frame_skip}
context_frames: ${dataset.context_length}
latent: ${dataset.latent}
data_mean: ${dataset.data_mean}
data_std: ${dataset.data_std}
external_cond_dim: ${dataset.external_cond_dim}
external_cond_stack: ${dataset.external_cond_stack}
external_cond_processing: ${dataset.external_cond_processing}
# training hyperparameters
compile: False
weight_decay: 1e-3
optimizer_beta: [0.9, 0.99]
lr_scheduler:
  name: constant_with_warmup
  num_warmup_steps: 5000
noise_level: random_independent
uniform_future:
  enabled: false
fixed_context:
  enabled: false
  indices: null # defaults to context_frames
  dropout: 0
variable_context:
  enabled: false
  prob: 0
  dropout: 0
# sampling scheme
chunk_size: -1
scheduling_matrix: full_sequence
replacement: noisy_scale

diffusion:
  is_continuous: False
  timesteps: 1000
  beta_schedule: cosine
  schedule_fn_kwargs:
    shift: 1.0
  use_causal_mask: False
  clip_noise: 20.0
  # training
  objective: pred_v
  loss_weighting:
    strategy: fused_min_snr
    snr_clip: 5.0
    cum_snr_decay: 0.9
  # sampling
  sampling_timesteps: 50
  ddim_sampling_eta: 0.0
  # (For full sequence diffusion)
  reconstruction_guidance: 0.0

# vae
vae:
  pretrained_path: null
  pretrained_kwargs: {}
  use_fp16: True
  batch_size: 2

checkpoint:
  reset_optimizer: False
  strict: True

# Two-phase finetuning schedule for cross-attention conditioning.
# Phase 1 (steps 0 … cross_attn_only_steps-1): freeze everything except cross_attn layers.
# Phase 2 (steps cross_attn_only_steps …):       unfreeze all parameters and finetune jointly.
# Set cross_attn_only_steps: 0 to disable (standard training, all params always unfrozen).
freeze_schedule:
  cross_attn_only_steps: 0

# video generation tasks
tasks:
  prediction:
    enabled: True
    history_guidance:
      name: conditional
    keyframe_density: null
    sliding_context_len: null
  interpolation:
    enabled: False
    history_guidance:
      name: conditional
    max_batch_size: null

# logging
logging:
  deterministic: 0
  loss_freq: 100
  grad_norm_freq: 100
  max_num_videos: 8
  n_metrics_frames: null
  metrics:
    - fvd
    - is
    - fid
    - lpips
    - mse
    - psnr
    - ssim
  metrics_batch_size: 16
  sanity_generation: False # generate video samples during sanity check
  raw_dir: null
  omniparser_cache_dir: null # Optional precomputed cache for semantic UI-element metrics during validation
  ocr_cache_dir: null # Optional PaddleOCR cache for high-weight text metrics during validation
  ocr_text_weight: 5.0
  ocr_min_confidence: 0.5
  # Cross-attention diagnostics. When enabled, logs W&B heatmaps during training
  # every cross_attn_map_freq steps and on the first validation/test batch.
  # For graph-token conditioning, heatmap rows are frames and columns are token slots.
  cross_attn_maps: false
  cross_attn_map_freq: 500
  cross_attn_map_max_blocks: 4

# Element-level spatial loss weighting.
# Up-weights MSE loss inside OmniParser-detected UI element bounding boxes.
#
# Prerequisites:
#   1. Precompute OmniParser cache:
#        python src/ui_sim/dfot_simulator/scripts/precompute_omniparser_cache.py ...
#   2. Enable clip metadata in the dataset config:
#        include_clip_metadata: true
#
# When enabled: false (default) or clip_metadata absent, loss is unchanged.
element_loss:
  enabled: false
  cache_dir: ""       # path to directory of per-trajectory *.json files
  text_cache_dir: ""  # optional PaddleOCR text cache; empty means use cache_dir text boxes
  base_weight: 1.0    # loss multiplier outside element bboxes (leave at 1.0)
  element_boost: 5.0  # loss multiplier inside element bboxes
  text_boost: 50.0    # loss multiplier inside OCR text bboxes
  text_min_confidence: 0.5
  text_padding_px: 2

# Graph-diff change-mask spatial loss weighting.
# Cache files are produced by scripts/entrypoints/dfot/precompute_change_masks_cache.py.
change_mask_loss:
  enabled: false
  cache_dir: ""       # path to directory of per-trajectory *.npz files
  base_weight: 1.0    # loss multiplier outside changed regions
  changed_boost: 5.0  # loss multiplier inside changed regions

# Contrastive graph-conditioning loss.
# Runs a second denoising pass with graph/node condition dims shuffled across the
# batch while action dims stay fixed, then enforces correct-cond loss < wrong-cond loss.
negative_condition_loss:
  enabled: false
  weight: 0.1
  margin: 0.02
  action_dims: 3
  shuffle_mode: batch_roll
  use_spatial_weights: true

# REPAINT-style inpainting for unchanged regions.
# At each sampling step, blends model predictions with noised reference frames
# using change masks, preserving unchanged pixel regions.
# Requires change masks to be available at inference time (computed from action graph).
inpainting:
  enabled: false
  cache_dir: ""       # path to directory of per-trajectory *.npz files (change masks)
  blend_alpha: 1.0    # blend factor for changed regions (1.0 = hard mask, <1.0 = soft blend)
